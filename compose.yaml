services:
  postgres_db:
    image: postgres:17
    networks:
      - agripulse-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agripulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d agripulse" ]
      start_period: 30s
      start_interval: 3s
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  agripulse-net:
    driver: bridge
